<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas</title>
    <link rel="stylesheet" href="tareas.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Mis Tareas</h1>
        </header>

        <main>
            <div class="input-section">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="Agregar una nueva tarea..." 
                    class="task-input"
                >
                <button id="addBtn" class="btn-add">Agregar</button>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">Todas</button>
                <button class="filter-btn" data-filter="active">Activas</button>
                <button class="filter-btn" data-filter="completed">Completadas</button>
            </div>

            <ul id="taskList" class="task-list">
                <li class="empty-state">No hay tareas aún. ¡Crea una nueva!</li>
            </ul>

            <footer class="footer">
                <span id="taskCount">0 tareas</span>
                <button id="clearBtn" class="btn-clear">Limpiar completadas</button>
            </footer>
        </main>
    </div>

    <script src="tareas.js"></script>
</body>
</html>
